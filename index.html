<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>WeQuit</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0c0c;
    --bg-panel: #141414;
    --border: #222;
    --text-dim: #333;
    --text-mid: #666;
    --text-bright: #aaa;
    --text-white: #eee;
    --center-fill: #0c0c0c;
    --center-stroke: #222;
  }

  body.theme-white {
    --bg: #f5f5f5; --bg-panel: #ececec; --border: #ddd;
    --text-dim: #bbb; --text-mid: #999; --text-bright: #555; --text-white: #111;
    --center-fill: #f5f5f5; --center-stroke: #ddd;
  }
  body.theme-lightgrey {
    --bg: #e0e0e0; --bg-panel: #d4d4d4; --border: #c4c4c4;
    --text-dim: #aaa; --text-mid: #888; --text-bright: #444; --text-white: #111;
    --center-fill: #e0e0e0; --center-stroke: #c4c4c4;
  }
  body.theme-anthracite {
    --bg: #3a3a3a; --bg-panel: #2e2e2e; --border: #4a4a4a;
    --text-dim: #555; --text-mid: #777; --text-bright: #bbb; --text-white: #eee;
    --center-fill: #3a3a3a; --center-stroke: #4a4a4a;
  }
  body.theme-darkgrey {
    --bg: #222; --bg-panel: #1a1a1a; --border: #333;
    --text-dim: #3a3a3a; --text-mid: #666; --text-bright: #aaa; --text-white: #ddd;
    --center-fill: #222; --center-stroke: #333;
  }
  body.theme-titanium {
    --bg: #8e9aad; --bg-panel: #7e8a9d; --border: #9eaabb;
    --text-dim: #6a7a8d; --text-mid: #aab8c8; --text-bright: #dde4ee; --text-white: #f0f4f8;
    --center-fill: #8e9aad; --center-stroke: #9eaabb;
  }
  body.theme-black {
    --bg: #000; --bg-panel: #0a0a0a; --border: #1a1a1a;
    --text-dim: #222; --text-mid: #555; --text-bright: #999; --text-white: #ddd;
    --center-fill: #000; --center-stroke: #1a1a1a;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Roboto Mono', monospace;
    overflow: hidden;
    user-select: none;
    transition: background 0.4s ease;
  }

  .header {
    position: fixed; top:0; left:0; right:0;
    padding: 26px 28px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 20;
  }

  .logo {
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.3em;
    color: var(--text-dim);
    text-transform: uppercase;
    transition: color 0.4s ease;
  }

  .settings-btn {
    width: 32px; height: 32px;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    gap: 5px; cursor: pointer; padding: 4px;
  }
  .settings-btn:hover { opacity: 0.6; }
  .settings-btn span {
    display: block; width: 18px; height: 1px;
    background: var(--text-mid);
    transition: background 0.4s ease;
  }

  .wheel-wrap {
    position: relative;
    width: min(86vw, 86vh, 500px);
    height: min(86vw, 86vh, 500px);
  }
  svg.wheel { width:100%; height:100%; overflow:visible; }

  .slice-group { cursor: pointer; }
  .slice-path { transition: filter 0.25s ease; }
  .slice-group:hover .slice-path {
    filter: brightness(1.15) drop-shadow(0 0 10px rgba(255,255,255,0.12));
  }
  .slice-group.locked .slice-path {
    opacity: 0.13; filter: saturate(0.15) brightness(0.5);
  }
  .slice-group.locked { cursor: default; }
  .slice-group.current .slice-path {
    filter: drop-shadow(0 0 14px rgba(255,255,255,0.2));
  }
  .slice-label {
    font-family: 'Roboto Mono', monospace;
    font-size: 9px; font-weight: 400;
    letter-spacing: 0.1em; pointer-events: none;
  }

  .footer {
    position: fixed; bottom:0; left:0; right:0;
    padding: 0 28px 26px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    z-index: 20;
    pointer-events: none;
  }
  .streak {
    font-size: 10px; font-weight: 300;
    color: var(--text-mid);
    letter-spacing: 0.08em; line-height: 1.8;
    transition: color 0.4s ease;
  }
  .streak strong {
    display: block; font-size: 28px; font-weight: 500;
    color: var(--text-white); letter-spacing: -0.02em;
    line-height: 1; margin-bottom: 4px;
    transition: color 0.4s ease;
  }
  .hint {
    font-size: 9px; font-weight: 300;
    color: var(--text-dim); letter-spacing: 0.12em;
    transition: color 0.4s ease;
  }

  /* ── PANEL ── */
  .panel-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 50; opacity: 0; pointer-events: none;
    transition: opacity 0.32s ease;
  }
  .panel-overlay.open { opacity:1; pointer-events:all; }

  .panel {
    position: fixed; top:0; right:0; bottom:0;
    width: min(300px, 84vw);
    background: var(--bg-panel);
    border-left: 1px solid var(--border);
    z-index: 60;
    transform: translateX(100%);
    transition: transform 0.38s cubic-bezier(0.32,0.72,0,1), background 0.4s ease, border-color 0.4s ease;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .panel.open { transform: translateX(0); }

  .panel-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 26px 22px 18px;
    border-bottom: 1px solid var(--border);
    transition: border-color 0.4s ease;
  }
  .panel-title {
    font-size: 10px; font-weight: 500;
    letter-spacing: 0.28em; color: var(--text-bright);
    text-transform: uppercase; transition: color 0.4s ease;
  }
  .panel-close {
    font-size: 20px; color: var(--text-mid);
    cursor: pointer; line-height: 1; padding: 2px;
    transition: color 0.2s ease;
  }
  .panel-close:hover { color: var(--text-white); }

  .panel-body {
    flex:1; overflow-y:auto;
    padding: 26px 22px;
    display: flex; flex-direction: column; gap: 34px;
  }

  .setting-label {
    font-size: 9px; font-weight: 500;
    letter-spacing: 0.22em; color: var(--text-mid);
    text-transform: uppercase; margin-bottom: 14px;
    transition: color 0.4s ease;
  }

  .swatches {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 9px;
  }
  .swatch {
    aspect-ratio: 1; border-radius: 7px; cursor: pointer;
    border: 1.5px solid transparent;
    transition: border-color 0.2s ease, transform 0.15s ease;
    position: relative; overflow: hidden;
  }
  .swatch:hover { transform: scale(1.06); }
  .swatch.active { border-color: var(--text-bright) !important; }
  .swatch-label {
    position: absolute; bottom: 5px; left:0; right:0;
    text-align: center; font-size: 7px;
    font-family: 'Roboto Mono', monospace;
    letter-spacing: 0.08em; font-weight: 400;
    text-transform: uppercase;
  }

  .date-row {
    display: grid; grid-template-columns: 1.8fr 2.6fr 2fr; gap: 7px;
  }
  .date-select-wrap { display: flex; flex-direction: column; gap: 5px; }
  .date-select-label {
    font-size: 8px; letter-spacing: 0.15em;
    color: var(--text-dim); text-transform: uppercase;
    transition: color 0.4s ease;
  }
  .date-select {
    background: var(--bg); border: 1px solid var(--border);
    color: var(--text-bright);
    font-family: 'Roboto Mono', monospace;
    font-size: 11px; font-weight: 400;
    padding: 9px 4px; border-radius: 6px;
    cursor: pointer; appearance: none; -webkit-appearance: none;
    text-align: center;
    transition: background 0.4s, border-color 0.4s, color 0.4s;
    width: 100%;
  }
  .date-select:focus { outline: none; border-color: var(--text-mid); }

  .date-confirm {
    margin-top: 13px; width: 100%; padding: 11px;
    background: transparent; border: 1px solid var(--border);
    color: var(--text-bright);
    font-family: 'Roboto Mono', monospace;
    font-size: 9px; letter-spacing: 0.2em;
    text-transform: uppercase; cursor: pointer;
    border-radius: 6px;
    transition: border-color 0.2s, color 0.2s;
  }
  .date-confirm:hover { border-color: var(--text-bright); color: var(--text-white); }

  .date-feedback {
    font-size: 9px; color: var(--text-mid);
    letter-spacing: 0.08em; margin-top: 9px; min-height: 14px;
    transition: color 0.4s ease;
  }
</style>
</head>
<body class="theme-black">

<div class="header">
  <div class="logo">WeQuit</div>
  <div class="settings-btn" onclick="openPanel()">
    <span></span><span></span><span></span>
  </div>
</div>

<div class="wheel-wrap">
  <svg class="wheel" id="wheel" viewBox="0 0 500 500">
    <defs>
      <filter id="glow-soft">
        <feGaussianBlur stdDeviation="4" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
    <g id="wheel-g"></g>
    <g id="center-g">
      <circle cx="250" cy="250" r="30" fill="var(--center-fill)" stroke="var(--center-stroke)" stroke-width="1.5"/>
      <text x="250" y="254" text-anchor="middle"
        font-family="Roboto Mono" font-size="6"
        fill="var(--text-dim)" letter-spacing="0.2em">WEQUIT</text>
    </g>
  </svg>
</div>

<div class="footer">
  <div class="streak">
    <strong id="days-count">—</strong>
    giorni senza fumare
  </div>
  <div class="hint">tocca un mese</div>
</div>

<div class="panel-overlay" id="overlay" onclick="closePanel()"></div>

<div class="panel" id="panel">
  <div class="panel-header">
    <div class="panel-title">Impostazioni</div>
    <div class="panel-close" onclick="closePanel()">×</div>
  </div>
  <div class="panel-body">

    <div>
      <div class="setting-label">Sfondo</div>
      <div class="swatches">
        <div class="swatch" data-theme="white"
          style="background:#f5f5f5;" onclick="setTheme('white')">
          <span class="swatch-label" style="color:#aaa;">bianco</span>
        </div>
        <div class="swatch" data-theme="lightgrey"
          style="background:#e0e0e0;" onclick="setTheme('lightgrey')">
          <span class="swatch-label" style="color:#999;">chiaro</span>
        </div>
        <div class="swatch" data-theme="anthracite"
          style="background:#3a3a3a;" onclick="setTheme('anthracite')">
          <span class="swatch-label" style="color:#888;">antracite</span>
        </div>
        <div class="swatch" data-theme="darkgrey"
          style="background:#222;" onclick="setTheme('darkgrey')">
          <span class="swatch-label" style="color:#666;">scuro</span>
        </div>
        <div class="swatch" data-theme="titanium"
          style="background:#8e9aad;" onclick="setTheme('titanium')">
          <span class="swatch-label" style="color:#dde4ee;">titanio</span>
        </div>
        <div class="swatch active" data-theme="black"
          style="background:#000; border-color:#555;" onclick="setTheme('black')">
          <span class="swatch-label" style="color:#444;">nero</span>
        </div>
      </div>
    </div>

    <div>
      <div class="setting-label">Data di inizio</div>
      <div class="date-row">
        <div class="date-select-wrap">
          <div class="date-select-label">Giorno</div>
          <select class="date-select" id="sel-day"></select>
        </div>
        <div class="date-select-wrap">
          <div class="date-select-label">Mese</div>
          <select class="date-select" id="sel-month"></select>
        </div>
        <div class="date-select-wrap">
          <div class="date-select-label">Anno</div>
          <select class="date-select" id="sel-year"></select>
        </div>
      </div>
      <button class="date-confirm" onclick="confirmDate()">conferma</button>
      <div class="date-feedback" id="date-feedback"></div>
    </div>

  </div>
</div>

<script>
const CX = 250, CY = 250, INNER_R = 44, GAP_DEG = 4;

const PALETTE = [
  '#f2c4b0','#b8d4c8','#f0e2a0','#c4b8d4',
  '#a8c8d8','#f4b8c0','#b0ccd4','#d4c8a8',
  '#c8d5b9','#f0c8a0','#b8c0d4','#d4b8c0',
];
const MONTH_NAMES = ['GEN','FEB','MAR','APR','MAG','GIU','LUG','AGO','SET','OTT','NOV','DIC'];
const MONTH_NAMES_FULL = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno',
                          'Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
const MONTH_RADII = [212,194,228,196,218,190,224,202,214,192,232,200];
const RAW_W = [38,27,33,25,36,24,37,27,31,25,39,26];
const RAW_SUM = RAW_W.reduce((a,b)=>a+b,0);
const AVAIL = 360 - 12 * GAP_DEG;
const WIDTHS = RAW_W.map(w => w / RAW_SUM * AVAIL);

// ── State ──
let quitDate = (() => {
  const s = localStorage.getItem('wq_date');
  return s ? new Date(s) : new Date('2026-01-01');
})();

let currentTheme = localStorage.getItem('wq_theme') || 'black';

function getDays() {
  return Math.max(0, Math.floor((new Date() - quitDate) / 86400000));
}
function getCurrentMonth() {
  return Math.min(11, Math.floor(getDays() / 30));
}

// ── Geometry ──
function toRad(d){ return d * Math.PI / 180; }
function polar(r, deg){ return [CX + r*Math.cos(toRad(deg)), CY + r*Math.sin(toRad(deg))]; }

function petalPath(startDeg, endDeg, innerR, outerR) {
  const span = endDeg - startDeg;
  const mid  = (startDeg + endDeg) / 2;
  const bellyR    = innerR + (outerR - innerR) * 0.50;
  const shoulderR = innerR + (outerR - innerR) * 0.74;
  const bellyHalf    = span * 0.43;
  const shoulderHalf = span * 0.28;
  const [oTx,oTy] = polar(outerR, mid);
  const [oLx,oLy] = polar(shoulderR, mid - shoulderHalf);
  const [oRx,oRy] = polar(shoulderR, mid + shoulderHalf);
  const [bLx,bLy] = polar(bellyR,   mid - bellyHalf);
  const [bRx,bRy] = polar(bellyR,   mid + bellyHalf);
  const [iLx,iLy] = polar(innerR,   mid - span*0.17);
  const [iRx,iRy] = polar(innerR,   mid + span*0.17);
  const [iTx,iTy] = polar(innerR-5, mid);
  const capPull = (outerR - shoulderR) * 0.72;
  const [cOLx,cOLy] = polar(outerR - capPull*0.28, mid - shoulderHalf*0.45);
  const [cORx,cORy] = polar(outerR - capPull*0.28, mid + shoulderHalf*0.45);
  return [
    `M ${iLx} ${iLy}`,
    `C ${bLx} ${bLy}, ${oLx} ${oLy}, ${cOLx} ${cOLy}`,
    `C ${oTx} ${oTy}, ${oTx} ${oTy}, ${oTx} ${oTy}`,
    `C ${oTx} ${oTy}, ${cORx} ${cORy}, ${cORx} ${cORy}`,
    `C ${oRx} ${oRy}, ${bRx} ${bRy}, ${iRx} ${iRy}`,
    `C ${iRx} ${iRy}, ${iTx+(iRx-iTx)*.3} ${iTy+(iRy-iTy)*.3}, ${iTx} ${iTy}`,
    `C ${iTx+(iLx-iTx)*.3} ${iTy+(iLy-iTy)*.3}, ${iLx} ${iLy}, ${iLx} ${iLy}`,
    `Z`
  ].join(' ');
}

// ── Render ──
function renderMonths() {
  const cur = getCurrentMonth();
  const g = document.getElementById('wheel-g');
  g.style.transition = 'opacity 0.18s ease';
  g.style.opacity = '0';

  setTimeout(() => {
    g.innerHTML = '';
    let angle = -90;

    MONTH_NAMES.forEach((label, i) => {
      const s = angle + GAP_DEG/2;
      const e = angle + WIDTHS[i] - GAP_DEG/2;
      const m = (s+e)/2;
      const outerR = MONTH_RADII[i];
      const state = i < cur ? 'unlocked' : i === cur ? 'current' : 'locked';
      const d = petalPath(s, e, INNER_R, outerR);

      const grp = document.createElementNS('http://www.w3.org/2000/svg','g');
      grp.setAttribute('class', `slice-group ${state}`);

      const path = document.createElementNS('http://www.w3.org/2000/svg','path');
      path.setAttribute('d', d);
      path.setAttribute('fill', PALETTE[i]);
      path.setAttribute('class','slice-path');
      if (state === 'current') {
        path.setAttribute('stroke','rgba(255,255,255,0.38)');
        path.setAttribute('stroke-width','1');
        path.setAttribute('filter','url(#glow-soft)');
      }
      grp.appendChild(path);

      if (state !== 'locked') {
        const gR = outerR - 16;
        const sp = e - s;
        const [g1x,g1y] = polar(gR, s + sp*0.22);
        const [g2x,g2y] = polar(gR, e - sp*0.22);
        const [gmx,gmy] = polar(gR+5, m);
        const groove = document.createElementNS('http://www.w3.org/2000/svg','path');
        groove.setAttribute('d',`M ${g1x} ${g1y} Q ${gmx} ${gmy} ${g2x} ${g2y}`);
        groove.setAttribute('fill','none');
        groove.setAttribute('stroke','rgba(255,255,255,0.15)');
        groove.setAttribute('stroke-width','0.8');
        groove.setAttribute('stroke-linecap','round');
        grp.appendChild(groove);
      }

      const lR = outerR + 19;
      const [lx,ly] = polar(lR, m);
      const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
      txt.setAttribute('x',lx); txt.setAttribute('y',ly);
      txt.setAttribute('text-anchor','middle');
      txt.setAttribute('dominant-baseline','middle');
      txt.setAttribute('class','slice-label');
      txt.setAttribute('transform',`rotate(${m+90},${lx},${ly})`);
      txt.setAttribute('fill',
        state==='locked'  ? 'var(--text-dim)' :
        state==='current' ? 'var(--text-white)' : 'var(--text-bright)');
      txt.textContent = label;
      grp.appendChild(txt);

      if (state === 'current') {
        const [dx,dy] = polar(outerR+7, m);
        const dot = document.createElementNS('http://www.w3.org/2000/svg','circle');
        dot.setAttribute('cx',dx); dot.setAttribute('cy',dy);
        dot.setAttribute('r','3');
        dot.setAttribute('fill','rgba(255,255,255,0.7)');
        grp.appendChild(dot);
      }

      g.appendChild(grp);
      angle += WIDTHS[i];
    });

    document.getElementById('center-g').parentNode.appendChild(
      document.getElementById('center-g'));

    g.style.transition = 'opacity 0.3s ease';
    g.style.opacity = '1';
  }, 200);
}

// ── Theme ──
function setTheme(t) {
  document.body.className = 'theme-' + t;
  currentTheme = t;
  localStorage.setItem('wq_theme', t);
  document.querySelectorAll('.swatch').forEach(s => {
    s.classList.toggle('active', s.dataset.theme === t);
  });
}

// ── Panel ──
function openPanel()  {
  document.getElementById('panel').classList.add('open');
  document.getElementById('overlay').classList.add('open');
}
function closePanel() {
  document.getElementById('panel').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

// ── Date selectors ──
function populateDateSelectors() {
  const selDay   = document.getElementById('sel-day');
  const selMonth = document.getElementById('sel-month');
  const selYear  = document.getElementById('sel-year');

  for (let d=1; d<=31; d++) {
    const o = document.createElement('option');
    o.value = d; o.textContent = String(d).padStart(2,'0');
    selDay.appendChild(o);
  }
  MONTH_NAMES_FULL.forEach((m,i) => {
    const o = document.createElement('option');
    o.value = i+1; o.textContent = m;
    selMonth.appendChild(o);
  });
  const ny = new Date().getFullYear();
  for (let y=ny; y>=ny-4; y--) {
    const o = document.createElement('option');
    o.value = y; o.textContent = y;
    selYear.appendChild(o);
  }
  selDay.value   = quitDate.getDate();
  selMonth.value = quitDate.getMonth()+1;
  selYear.value  = quitDate.getFullYear();
}

function confirmDate() {
  const d = +document.getElementById('sel-day').value;
  const m = +document.getElementById('sel-month').value - 1;
  const y = +document.getElementById('sel-year').value;
  const date = new Date(y, m, d);
  const fb = document.getElementById('date-feedback');

  if (isNaN(date.getTime())) { fb.textContent = 'data non valida'; return; }
  if (date > new Date())     { fb.textContent = 'la data è nel futuro'; return; }

  quitDate = date;
  localStorage.setItem('wq_date', date.toISOString());

  const days = getDays();
  document.getElementById('days-count').textContent = days;
  fb.textContent = `salvato · ${days} giorni fa`;
  renderMonths();
  setTimeout(() => { fb.textContent = ''; }, 3000);
}

// ── Init ──
document.addEventListener('DOMContentLoaded', () => {
  setTheme(currentTheme);
  populateDateSelectors();
  document.getElementById('days-count').textContent = getDays();
  renderMonths();
});
</script>
</body>
</html>
